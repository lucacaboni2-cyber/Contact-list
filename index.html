<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact List</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .hero {
      text-align: center;
      max-width: 640px;
    }

    .badge {
      display: inline-block;
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 1.25rem;
    }

    p {
      font-size: 1.125rem;
      color: #999;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 0.6rem;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      border: none;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,255,255,0.15); }

    .btn-primary { background: #fff; color: #000; }
    .btn-outline { background: transparent; border: 1px solid #fff; color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.25rem;
      margin-top: 4rem;
      width: 100%;
      max-width: 640px;
    }

    .card {
      background: #111;
      border: 1px solid #333;
      border-radius: 1rem;
      padding: 1.5rem;
      text-align: center;
    }

    .card-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; color: #fff; }
    .card p { font-size: 0.875rem; color: #666; margin: 0; }

    /* Modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .overlay.open { display: flex; }

    .modal {
      background: #111;
      border: 1px solid #333;
      border-radius: 1rem;
      padding: 2rem;
      width: 100%;
      max-width: 460px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .modal-header h2 { font-size: 1.25rem; font-weight: 700; }

    .close-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem;
    }

    .close-btn:hover { color: #fff; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .field { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input, textarea {
      width: 100%;
      background: #000;
      border: 1px solid #333;
      border-radius: 0.5rem;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus { border-color: #fff; }

    textarea { resize: vertical; min-height: 90px; }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .modal-footer .btn { flex: 1; justify-content: center; }

    .message {
      font-size: 0.85rem;
      margin-top: 0.75rem;
      text-align: center;
      min-height: 1.2rem;
    }

    .message.error { color: #f87171; }
    .message.success { color: #4ade80; }
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid #222;
      background: #000;
      z-index: 50;
    }

    .nav-brand { font-weight: 800; font-size: 1rem; letter-spacing: -0.02em; }

    .nav-right { display: flex; align-items: center; gap: 0.75rem; }

    .nav-user { font-size: 0.85rem; color: #666; }

    .btn-sm {
      padding: 0.45rem 1.1rem;
      font-size: 0.875rem;
      border-radius: 0.45rem;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand">Contact List</div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <a href="login.html" class="btn btn-outline btn-sm" id="nav-login-btn">Login</a>
      <button class="btn btn-primary btn-sm" id="nav-logout-btn" style="display:none" onclick="handleLogout()">Logout</button>
    </div>
  </nav>

  <div class="hero">
    <div class="badge">Contact List App</div>
    <h1>Stay connected with everyone.</h1>
    <p>A simple, fast, and beautiful way to manage your contacts. Store, search, and share — all in one place.</p>
    <div class="actions">
      <button class="btn btn-primary" onclick="openModal()">&#43; Add Contact</button>
      <a href="contacts.html" class="btn btn-outline">&#128269; Browse Contacts</a>
    </div>
  </div>


  <!-- Add Contact Modal -->
  <div class="overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Contact</h2>
        <button class="close-btn" onclick="closeModal()">&#x2715;</button>
      </div>

      <div class="row">
        <div class="field">
          <label for="c-name">Name</label>
          <input id="c-name" type="text" placeholder="John" />
        </div>
        <div class="field">
          <label for="c-surname">Surname</label>
          <input id="c-surname" type="text" placeholder="Doe" />
        </div>
      </div>

      <div class="field">
        <label for="c-email">Email</label>
        <input id="c-email" type="email" placeholder="john@example.com" />
      </div>

      <div class="field">
        <label for="c-desc">Description</label>
        <textarea id="c-desc" placeholder="Notes about this contact…"></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="save-btn" onclick="saveContact()">Save Contact</button>
      </div>

      <div class="message" id="modal-msg"></div>
    </div>
  </div>

  <script>
    let _supabase = null;
    function getSupabase() {
      if (!_supabase) {
        _supabase = window.supabase.createClient(
          'https://nklekakddfviwjhuqggi.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rbGVrYWtkZGZ2aXdqaHVxZ2dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDU3OTEsImV4cCI6MjA5MjI4MTc5MX0.nbokOmpsGP2j9O5-7wI7lNRbtHqxB9Xmnis_e3nllIY'
        );
      }
      return _supabase;
    }

    async function initNav() {
      const { data: { session } } = await getSupabase().auth.getSession();
      const loginBtn = document.getElementById('nav-login-btn');
      const logoutBtn = document.getElementById('nav-logout-btn');
      const navUser = document.getElementById('nav-user');
      if (session?.user) {
        navUser.textContent = session.user.email;
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-flex';
      }
    }

    async function handleLogout() {
      await getSupabase().auth.signOut();
      window.location.reload();
    }

    window.addEventListener('DOMContentLoaded', initNav);

    function openModal() {
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.getElementById('modal-msg').textContent = '';
      document.getElementById('modal-msg').className = 'message';
      ['c-name','c-surname','c-email','c-desc'].forEach(id => document.getElementById(id).value = '');
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    async function saveContact() {
      const name = document.getElementById('c-name').value.trim();
      const surname = document.getElementById('c-surname').value.trim();
      const email = document.getElementById('c-email').value.trim();
      const description = document.getElementById('c-desc').value.trim();
      const msg = document.getElementById('modal-msg');
      const btn = document.getElementById('save-btn');

      if (!name || !surname) {
        msg.className = 'message error';
        msg.textContent = 'Name and surname are required.';
        return;
      }

      btn.disabled = true;
      msg.className = 'message';
      msg.textContent = 'Saving…';

      try {
        const sb = getSupabase();
        const { data: sessionData } = await sb.auth.getSession();
        const userId = sessionData?.session?.user?.id ?? null;

        const { error } = await sb.from('contacts').insert({
          user_id: userId,
          name,
          surname,
          email: email || null,
          description: description || null,
        });

        if (error) throw error;

        msg.className = 'message success';
        msg.textContent = 'Contact saved!';
        setTimeout(closeModal, 1200);
      } catch (err) {
        msg.className = 'message error';
        msg.textContent = err.message || 'Something went wrong.';
      } finally {
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>

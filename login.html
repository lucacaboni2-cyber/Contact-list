<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Contact List</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #111;
      border: 1px solid #333;
      border-radius: 1rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #333;
      margin-bottom: 1.75rem;
    }

    .tab {
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 0.95rem;
      color: #666;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab.active { color: #fff; border-bottom-color: #fff; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: #000;
      border: 1px solid #333;
      border-radius: 0.5rem;
      color: #fff;
      font-size: 1rem;
      padding: 0.7rem 1rem;
      margin-bottom: 1.25rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #fff; }

    .btn {
      width: 100%;
      padding: 0.8rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .message {
      margin-top: 1rem;
      font-size: 0.875rem;
      text-align: center;
      min-height: 1.25rem;
    }

    .message.error { color: #f87171; }
    .message.success { color: #4ade80; }

    .back {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: #555;
      font-size: 0.85rem;
      text-decoration: none;
    }

    .back:hover { color: #fff; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">Contact List</div>
  <div class="subtitle">Sign in to manage your contacts</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <div id="form-login">
    <label for="login-email">Email</label>
    <input id="login-email" type="email" placeholder="you@example.com" />
    <label for="login-password">Password</label>
    <input id="login-password" type="password" placeholder="••••••••" />
    <button class="btn" onclick="handleLogin()">Login</button>
    <div class="message" id="login-msg"></div>
  </div>

  <div id="form-signup" style="display:none">
    <label for="signup-email">Email</label>
    <input id="signup-email" type="email" placeholder="you@example.com" />
    <label for="signup-password">Password</label>
    <input id="signup-password" type="password" placeholder="Min 6 characters" />
    <button class="btn" onclick="handleSignup()">Create Account</button>
    <div class="message" id="signup-msg"></div>
  </div>

  <a class="back" href="index.html">← Back to home</a>
</div>

<script>
  const SUPABASE_URL = 'https://nklekakddfviwjhuqggi.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rbGVrYWtkZGZ2aXdqaHVxZ2dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDU3OTEsImV4cCI6MjA5MjI4MTc5MX0.nbokOmpsGP2j9O5-7wI7lNRbtHqxB9Xmnis_e3nllIY';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
    });
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const msg = document.getElementById('login-msg');
    msg.className = 'message';
    msg.textContent = 'Signing in…';

    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      msg.className = 'message error';
      msg.textContent = error.message;
    } else {
      msg.className = 'message success';
      msg.textContent = 'Logged in! Redirecting…';
      setTimeout(() => window.location.href = 'index.html', 1000);
    }
  }

  async function handleSignup() {
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const msg = document.getElementById('signup-msg');
    msg.className = 'message';
    msg.textContent = 'Creating account…';

    const { error } = await supabase.auth.signUp({ email, password });
    if (error) {
      msg.className = 'message error';
      msg.textContent = error.message;
    } else {
      msg.className = 'message success';
      msg.textContent = 'Check your email to confirm your account!';
    }
  }
</script>

</body>
</html>
